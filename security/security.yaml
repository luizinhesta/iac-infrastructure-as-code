AWSTemplateFormatVersion: '2010-09-09'
Description: Security stack

Parameters:
  VpcStackName:
    Type: String
    Default: vpc-stack

Resources:

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and HTTP
      VpcId:
        Fn::ImportValue:
          Fn::Sub: "${VpcStackName}-vpc-id"

      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 191.254.200.80/32

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

Outputs:

  SecurityGroupId:
    Value: !Ref InstanceSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-ec2-sg"
