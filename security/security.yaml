AWSTemplateFormatVersion: '2010-09-09'
Description: Security stack

Resources:

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and ICMP
      VpcId: !ImportValue network-vpc-id

      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

Outputs:

  SecurityGroupId:
    Value: !Ref InstanceSecurityGroup
    Export:
      Name: security-ec2-sg