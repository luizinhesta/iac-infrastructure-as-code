AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 stack

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: LinuxUbuntu

Resources:

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro

      ImageId: ami-0030e4319cbf4dbf2

      KeyName: !Ref KeyName

      SubnetId: !ImportValue network-public-subnet1

      SecurityGroupIds:
        - !ImportValue security-ec2-sg

      Tags:
        - Key: Name
          Value: ec2-instance

Outputs:

  InstanceId:
    Value: !Ref EC2Instance

  PublicIP:
    Value: !GetAtt EC2Instance.PublicIp