version: 0.2

phases:

  install:
    commands:
      - echo "========== INICIO DO BUILD =========="
      - yum install -y awscli
      - aws --version

  build:
    commands:
      - echo "========== DEBUG =========="
      - pwd
      - ls -la
      - find .

      - echo "========== UPLOAD =========="

      - aws s3 cp network/ s3://iac-cloudformation-templates-bucket/network/ --recursive || echo "Erro network"
      - aws s3 cp security/ s3://iac-cloudformation-templates-bucket/security/ --recursive || echo "Erro security"

      - echo "========== FINALIZADO =========="

artifacts:
  files:
    - '**/*'