AWSTemplateFormatVersion: '2010-09-09'
Description: Main Infrastructure Stack

Resources:

  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: stack1-vpc.yaml

  EC2Stack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      TemplateURL: stack2-ec2.yaml